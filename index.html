<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thành Tiên Lộ - TG Team</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* Giao diện UI nhỏ gọn */
        .mini-window { position: absolute; background: rgba(20, 20, 30, 0.95); border: 2px solid #0ff; color: white; padding: 10px; display: none; z-index: 100; box-shadow: 0 0 15px #0ff; border-radius: 5px; font-size: 12px; }
        #inv-panel { top: 10%; right: 10%; width: 220px; }
        #shop-panel { top: 10%; left: 10%; width: 200px; }
        #farm-panel { bottom: 20%; left: 10%; width: 180px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .slot { width: 50px; height: 50px; background: #333; border: 1px solid #555; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; text-align: center; }
        .slot:hover { border-color: #0ff; background: #444; }
        
        .btn-ui { background: #0ff; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; margin: 2px; border-radius: 3px; }
        
        /* Mobile Control */
        #mobile-btns { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m-row { display: flex; gap: 10px; justify-content: center; }
        .ctrl-btn { width: 60px; height: 60px; background: rgba(0, 255, 255, 0.2); border: 2px solid #0ff; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none; }
    </style>
</head>
<body>

<div id="menu-screen" style="position:fixed; inset:0; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#0ff;">
    <h1 style="font-size:50px; text-shadow: 0 0 20px #a020f0; margin-bottom: 5px;">TG TEAM</h1>
    <h2 style="color:#ffd700; letter-spacing: 10px;">THÀNH TIÊN LỘ</h2>
    
    <div id="load-box" style="width:250px; height:15px; border:2px solid #0ff; padding: 2px;">
        <div id="load-fill" style="width:0%; height:100%; background:#0ff;"></div>
    </div>

    <div id="setup-box" style="display:none; text-align:center;">
        <div style="display:flex; gap:50px; margin: 30px;">
            <div id="sel-nam" onclick="pickChar('Nam')" style="cursor:pointer; padding:10px; border:2px solid transparent;">
                <canvas id="canvas-nam" width="100" height="120"></canvas>
                <p>NAM NHÂN</p>
            </div>
            <div id="sel-nu" onclick="pickChar('Nữ')" style="cursor:pointer; padding:10px; border:2px solid transparent;">
                <canvas id="canvas-nu" width="100" height="120"></canvas>
                <p>NỮ NHÂN</p>
            </div>
        </div>
        <div id="guide-box" style="background:rgba(255,255,255,0.1); padding:10px; border-radius:5px; font-size:12px; color:#ccc;">
            <b>HƯỚNG DẪN:</b><br>PC: WASD - Di chuyển | Space - Đánh | J,K,L - Kỹ năng | E - Tương tác<br>Mobile: Dùng các nút trên màn hình
        </div>
        <button id="start-btn" class="btn-ui" style="margin-top:20px; padding:15px 40px; font-size:20px;" onclick="beginGame()">KHỞI ĐẦU TU TIÊN</button>
    </div>
</div>

<div id="inv-panel" class="mini-window">
    <b>KHO ĐỒ & KỸ NĂNG</b>
    <div id="inv-items" class="grid"></div>
    <button class="btn-ui" style="width:100%; margin-top:10px;" onclick="toggleUI('inv-panel')">ĐÓNG</button>
</div>

<div id="shop-panel" class="mini-window">
    <b>TRÂN BẢO CÁC</b>
    <div id="shop-items"></div>
    <button class="btn-ui" style="width:100%; margin-top:10px;" onclick="toggleUI('shop-panel')">ĐÓNG</button>
</div>

<div id="farm-panel" class="mini-window">
    <b>LINH ĐIỀN</b>
    <div id="farm-grid" class="grid"></div>
    <button class="btn-ui" style="width:100%; margin-top:10px;" onclick="toggleUI('farm-panel')">ĐÓNG</button>
</div>

<div id="mobile-btns">
    <div class="m-row">
        <div class="ctrl-btn" onclick="gameAction('i')">KHO</div>
        <div class="ctrl-btn" onclick="gameAction('p')">SHOP</div>
        <div class="ctrl-btn" onclick="gameAction('g')">FARM</div>
    </div>
    <div class="m-row">
        <div class="ctrl-btn" style="background:rgba(255,0,0,0.3)" onclick="gameAction('j')">S1</div>
        <div class="ctrl-btn" style="background:rgba(255,0,0,0.3)" onclick="gameAction('k')">S2</div>
        <div class="ctrl-btn" style="background:rgba(255,0,0,0.3)" onclick="gameAction('l')">S3</div>
    </div>
    <div class="m-row">
        <div class="ctrl-btn" style="width:130px; border-radius:10px; background:#f1c40f; color:#000" onclick="gameAction('space')">TẤN CÔNG (E)</div>
    </div>
</div>

<script>
/** * THÀNH TIÊN LỘ - PHIÊN BẢN HOÀN THIỆN NHẤT
 * Dev by Gemini - 2026 | Dành riêng cho TG TEAM
 */

const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

const BOSS_DATA = [
    { n: "Naruto", s: "Rasengan", c: "#f39c12", sc: "#0ff", m: "Làng Lá sẽ không bao giờ gục ngã!" },
    { n: "Sasuke", s: "Chidori", c: "#8e44ad", sc: "#fff", m: "Sức mạnh của Thiên Chiếu..." },
    { n: "Luffy", s: "Gear 5", c: "#e74c3c", sc: "#fff", m: "Ta là người tự do nhất biển cả!" },
    { n: "Zoro", s: "Ashura", c: "#27ae60", sc: "#0f0", m: "Cửu kiếm phái - A Tu La!" },
    { n: "Gojo", s: "Tử (Purple)", c: "#fff", sc: "#a020f0", m: "Vô hạn là ranh giới giữa chúng ta." },
    { n: "Eren", s: "Rung Chấn", c: "#4b2c20", sc: "#ff4500", m: "Ta sẽ tiêu diệt tất cả!" }
    // Game hỗ trợ tới 30 tầng boss
];

let game = {
    state: 'menu', floor: 1, gold: 500, keys: 0, 
    inBossRoom: false, cam: {x:0, y:0},
    maze: [], enemies: [], items: [], particles: [],
    skillsLearned: [], equipped: [null, null, null],
    seeds: 5, plants: Array(6).fill(null),
    dialogue: { active: false, speaker: "", text: "" },
    notifs: [], charPicked: 'Nam', dead: false
};

let player = {
    x: 100, y: 100, hp: 100, maxHp: 100, lvl: 1, rank: 'Phàm Nhân', exp: 0,
    vx: 0, vy: 0, speed: 5, color: '#3498db', swing: 0, cd: [0, 0, 0], anim: 0
};

// --- HỆ THỐNG VẼ PIXEL ---
function drawPixel(c, x, y, col, isBoss=false, swing=0, scale=4) {
    c.save(); c.translate(x, y);
    let bob = Math.sin(Date.now()/150)*4;
    // Thân
    c.fillStyle = col; c.fillRect(-scale*2, bob, scale*5, scale*7);
    // Đầu
    c.fillStyle = "#ffdbac"; c.fillRect(-scale, -scale*5+bob, scale*3, scale*4);
    // Animation Chém
    if(swing > 0) {
        c.fillStyle = "#fff"; c.rotate(swing); c.fillRect(scale*2, 0, scale*6, scale);
    }
    c.restore();
}

// --- KHỞI CHẠY MENU ---
function pickChar(g) {
    game.charPicked = g;
    player.color = (g === 'Nam') ? '#3498db' : '#f0f';
    document.getElementById('sel-nam').style.borderColor = g==='Nam'?'#0ff':'transparent';
    document.getElementById('sel-nu').style.borderColor = g==='Nữ'?'#0ff':'transparent';
}

function beginGame() {
    game.state = 'playing';
    document.getElementById('menu-screen').style.display = 'none';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    initFloor(1);
    requestAnimationFrame(loop);
}

function initFloor(f) {
    game.floor = f; game.inBossRoom = false; game.enemies = []; game.items = []; game.particles = []; game.keys = 0;
    generateMaze();
    player.x = 120; player.y = 120;
    
    // Spawn quái thường (Xương)
    for(let i=0; i<6; i++) spawnEnemy(false);
    // Rương ngẫu nhiên
    for(let i=0; i<3; i++) game.items.push({x: Math.random()*1500+200, y: Math.random()*1500+200, type:'chest', isMimic: Math.random()<0.3});
    // Cánh cửa Boss
    game.items.push({x: 1800, y: 1800, type:'door'});

    if(f === 1) startDialogue("Phàm Lão", "Chào tiểu hữu. Hãy tìm chìa khóa từ quái xương để mở cửa Boss cuối đường. Ta sẽ giúp ngươi tầng này!");
}

function generateMaze() {
    game.maze = []; const S = 25;
    for(let y=0; y<S; y++) {
        game.maze[y] = [];
        for(let x=0; x<S; x++) {
            game.maze[y][x] = (x===0 || y===0 || x===S-1 || y===S-1 || (Math.random()<0.18 && x%2===0)) ? 1 : 0;
        }
    }
    for(let i=1; i<4; i++) for(let j=1; j<4; j++) game.maze[i][j] = 0; // Safe zone
}

function spawnEnemy(isBoss) {
    if(!isBoss) {
        game.enemies.push({x: Math.random()*1500+200, y: Math.random()*1500+200, hp: 40+(game.floor*10), maxHp: 40+(game.floor*10), color: '#bdc3c7', speed: 1.5, isBoss: false});
    }
}

// --- CORE LOOP ---
function loop() {
    if(game.state !== 'playing' || game.dialogue.active) { draw(); requestAnimationFrame(loop); return; }

    // Camera
    game.cam.x += (player.x - canvas.width/2 - game.cam.x) * 0.1;
    game.cam.y += (player.y - canvas.height/2 - game.cam.y) * 0.1;

    // Di chuyển
    let nx = player.x + player.vx * player.speed;
    let ny = player.y + player.vy * player.speed;
    if(!checkCol(nx, player.y)) player.x = nx;
    if(!checkCol(player.x, ny)) player.y = ny;

    if(player.swing > 0) player.swing -= 0.15;
    player.cd = player.cd.map(v => v > 0 ? v - 1 : 0);

    // AI Quái & Boss
    game.enemies.forEach((en, i) => {
        let d = Math.hypot(player.x-en.x, player.y-en.y);
        if(d < 500) {
            let a = Math.atan2(player.y-en.y, player.x-en.x);
            en.x += Math.cos(a)*en.speed; en.y += Math.sin(a)*en.speed;
            if(d < 40) player.hp -= 0.4;
            if(en.isBoss) {
                en.skillCd = (en.skillCd || 1) - 1;
                if(en.skillCd <= 0) { en.skillCd = 300; bossCast(en); }
            }
        }
    });

    // Quái spawn vô hạn
    if(!game.inBossRoom && game.enemies.length < 5 && game.keys === 0) spawnEnemy(false);

    // Xử lý hiệu ứng skill
    // Xử lý hiệu ứng skill (Hỗ trợ cả skill của Người chơi)
    game.particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy;
        
        if (!p.isPlayerSkill) {
            // Nếu là đạn của BOSS -> Gây sát thương cho bạn
            if(Math.hypot(player.x-p.x, player.y-p.y) < 35) { 
                player.hp -= 15; 
                game.particles.splice(i, 1); 
            }
        } else {
            // Nếu là kỹ năng của BẠN -> Gây sát thương cho quái
            game.enemies.forEach((en, ei) => {
                if(Math.hypot(en.x-p.x, en.y-p.y) < 50) { 
                    en.hp -= 30; // Sát thương khi tia linh lực chạm quái
                    game.particles.splice(i, 1); 
                }
            });
        }
        p.life--; if(p.life <= 0) game.particles.splice(i, 1);
    });

    if(player.hp <= 0 && !game.dead) gameOver();

    draw();
    requestAnimationFrame(loop);
}

function bossCast(en) {
    addNotif(`BOSS: ${en.skill.toUpperCase()}!`);
    let a = Math.atan2(player.y-en.y, player.x-en.x);
    for(let i=0; i<10; i++) {
        game.particles.push({x: en.x, y: en.y, vx: Math.cos(a+(i-5)*0.2)*12, vy: Math.sin(a+(i-5)*0.2)*12, col: en.sc, life: 50});
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.save(); ctx.translate(-game.cam.x, -game.cam.y);

    if(!game.inBossRoom) {
        ctx.fillStyle="#1a1a2e";
        for(let y=0; y<game.maze.length; y++) {
            for(let x=0; x<game.maze[y].length; x++) {
                if(game.maze[y][x]===1) ctx.fillRect(x*80, y*80, 80, 80);
            }
        }
    } else {
        // Không gian Boss riêng
        ctx.fillStyle="#201"; ctx.fillRect(player.x-400, player.y-400, 800, 800);
        ctx.strokeStyle="#f00"; ctx.lineWidth=5; ctx.strokeRect(player.x-400, player.y-400, 800, 800);
    }

    game.items.forEach(it => {
        ctx.fillStyle = it.type==='chest'?'#ffd700':'#0ff';
        ctx.fillRect(it.x, it.y, 40, 40);
        ctx.fillStyle="#fff"; ctx.font="10px Arial"; ctx.fillText(it.type==='chest'?"RƯƠNG (E)":"CỬA BOSS (E)", it.x, it.y-10);
    });

    game.enemies.forEach(en => {
        drawPixel(ctx, en.x, en.y, en.color, en.isBoss, 0, en.isBoss?8:4);
        ctx.fillStyle="red"; ctx.fillRect(en.x-20, en.y-30, (en.hp/en.maxHp)*40, 4);
    });

    game.particles.forEach(p => { ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill(); });

    drawPixel(ctx, player.x, player.y, player.color, false, player.swing);
    ctx.restore();

    drawHUD();
    if(game.dialogue.active) drawDialogue();
}

function drawHUD() {
    // Thanh máu & Thông tin
    ctx.fillStyle="rgba(0,0,0,0.8)"; ctx.fillRect(10, 10, 240, 90);
    ctx.fillStyle="#0ff"; ctx.font="bold 14px Arial";
    ctx.fillText(`TẦNG: ${game.floor} | ${player.rank} (Lv.${player.lvl})`, 20, 30);
    ctx.fillStyle="#ffd700"; ctx.fillText(`VÀNG: ${game.gold} | CHÌA KHÓA: ${game.keys}`, 20, 50);
    ctx.fillStyle="#444"; ctx.fillRect(20, 65, 200, 12);
    ctx.fillStyle="red"; ctx.fillRect(20, 65, (player.hp/player.maxHp)*200, 12);

    // Skill slots
    [0,1,2].forEach(i => {
        let x = 300 + i*60, y = 45;
        ctx.fillStyle="rgba(0,255,255,0.2)"; ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="#0ff"; ctx.stroke();
        ctx.fillStyle="#fff"; ctx.font="9px Arial";
        let sk = game.equipped[i];
        ctx.fillText(sk?sk.n:"Trống", x-15, y+5);
        if(player.cd[i]>0) { ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.fill(); }
    });

    game.notifs.forEach((n, i) => {
        ctx.fillStyle=`rgba(255,255,255,${n.a})`; ctx.fillText(n.m, canvas.width/2-60, 150+i*25);
        n.a -= 0.01; if(n.a<=0) game.notifs.splice(i,1);
    });
}

function drawDialogue() {
    ctx.fillStyle="rgba(0,0,0,0.95)"; ctx.fillRect(0, canvas.height-160, canvas.width, 160);
    ctx.strokeStyle="#ffd700"; ctx.strokeRect(10, canvas.height-150, canvas.width-20, 140);
    ctx.fillStyle="#ffd700"; ctx.font="bold 22px Arial"; ctx.fillText(game.dialogue.speaker, 40, canvas.height-120);
    ctx.fillStyle="#fff"; ctx.font="18px Arial"; ctx.fillText(game.dialogue.text, 40, canvas.height-80);
    ctx.font="12px Arial"; ctx.fillText("(ẤN SPACE ĐỂ TIẾP TỤC)", canvas.width-200, canvas.height-20);
}

// --- HÀNH ĐỘNG GAME ---
function gameAction(type) {
    if(type === 'space') {
        if(game.dialogue.active) { game.dialogue.active = false; return; }
        interact();
        player.swing = 1.5;
        game.enemies.forEach((en, i) => {
            if(Math.hypot(player.x-en.x, player.y-en.y) < 100) {
                en.hp -= 25 + (player.lvl*10);
                if(en.hp <= 0) {
                    if(en.isBoss) winBoss(en);
                    else { game.gold += 30; if(Math.random()<0.25) { game.keys = 1; addNotif("ĐÃ NHẬN CHÌA KHÓA BOSS!"); } }
                    game.enemies.splice(i,1);
                }
            }
        });
    }
    if(type === 'j') useSkill(0);
    if(type === 'k') useSkill(1);
    if(type === 'l') useSkill(2);
    if(type === 'i') toggleUI('inv-panel');
    if(type === 'p') toggleUI('shop-panel');
    if(type === 'g') toggleUI('farm-panel');
}

function interact() {
    game.items.forEach((it, i) => {
        if(Math.hypot(player.x-it.x, player.y-it.y) < 80) {
            if(it.type === 'chest') {
                if(it.isMimic) { 
                    game.enemies.push({x: it.x, y: it.y, hp: 120, maxHp: 120, color: '#e67e22', speed: 2.5, isBoss: false});
                    addNotif("RƯƠNG BỊ ÁM (MIMIC)!");
                } else { game.gold += 150; addNotif("+150 Vàng"); }
                game.items.splice(i,1);
            } else if(it.type === 'door') {
                if(game.keys > 0) enterBoss(); else addNotif("CẦN CHÌA KHÓA BOSS!");
            }
        }
    });
}

function enterBoss() {
    game.inBossRoom = true;
    let b = BOSS_DATA[(game.floor-1)%BOSS_DATA.length];
    game.enemies = [{x: player.x+200, y: player.y, hp: 300+(game.floor*100), maxHp: 300+(game.floor*100), color: b.c, isBoss: true, name: b.n, skill: b.s, sc: b.sc, speed: 2, skillCd: 150}];
    startDialogue(b.n, b.m);
    game.items = []; // Xóa cửa khi đã vào
}

function winBoss(en) {
    addNotif(`CHIẾN THẮNG BOSS ${en.name.toUpperCase()}!`);
    
    // ĐOẠN QUAN TRỌNG: Lưu cả tên và màu sắc để dùng cho hiệu ứng chiêu thức sau này
    game.skillsLearned.push({
        n: en.skill, 
        c: en.sc || en.color 
    });
    
    updateInv();
    
    if (game.floor === 30) {
        startDialogue("TIÊN NHÂN", "Chúc mừng! Bạn đã đạt tới đỉnh cao của Thành Tiên Lộ. TG Team chúc mừng bạn!");
        setTimeout(() => location.reload(), 10000);
    } else {
        initFloor(game.floor + 1);
        player.lvl++;
        const ranks = ["Phàm Nhân", "Luyện Khí", "Trúc Cơ", "Kim Đan", "Nguyên Anh", "Hóa Thần", "Luyện Hư", "Hợp Thể", "Đại Thừa", "Độ Kiếp"];
        player.rank = ranks[Math.floor(player.lvl / 2)] || "Tiên Nhân";
    }
}

function useSkill(idx) {
    if (player.cd[idx] > 0 || !game.equipped[idx]) return;
    let sk = game.equipped[idx];
    player.cd[idx] = 300; // Hồi chiêu 5 giây
    addNotif(`TUYỆT KỸ: ${sk.n.toUpperCase()}!`);
    player.swing = 2.5;

    // Xác định hướng bắn dựa trên di chuyển của nhân vật
    let angle = (player.vx !== 0 || player.vy !== 0) ? Math.atan2(player.vy, player.vx) : 0;

    // Tạo 10 tia linh lực tỏa ra mang màu sắc của Boss
    for (let i = 0; i < 10; i++) {
        game.particles.push({
            x: player.x,
            y: player.y,
            vx: Math.cos(angle + (i - 5) * 0.2) * 12, 
            vy: Math.sin(angle + (i - 5) * 0.2) * 12,
            col: sk.c,       // Màu sắc kỹ năng của Boss đã thu thập
            life: 45,        
            isPlayerSkill: true 
        });
    }

    // Sát thương nổ diện rộng xung quanh
    game.enemies.forEach((en, i) => {
        if (Math.hypot(player.x - en.x, player.y - en.y) < 200) {
            en.hp -= 120 + (player.lvl * 20);
            if (en.hp <= 0) {
                if (en.isBoss) winBoss(en);
                else { game.gold += 30; if (Math.random() < 0.25) game.keys = 1; }
                game.enemies.splice(i, 1);
            }
        }
    });
}

function toggleUI(id) {
    let el = document.getElementById(id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
    if(id==='inv-panel') updateInv();
    if(id==='shop-panel') updateShop();
    if(id==='farm-panel') updateFarm();
}

function updateInv() {
    let container = document.getElementById('inv-items');
    container.innerHTML = "";
    game.skillsLearned.forEach((sk, i) => {
        let div = document.createElement('div'); div.className = 'slot';
        div.style.background = sk.c; div.innerText = sk.n;
        div.onclick = () => {
            let s = prompt("Trang bị vào ô 1, 2, hoặc 3?");
            if(s >= 1 && s <= 3) { game.equipped[s-1] = sk; addNotif("Đã lắp kỹ năng!"); updateInv(); }
        };
        container.appendChild(div);
    });
}

function updateShop() {
    let s = document.getElementById('shop-items');
    s.innerHTML = `<p>Vàng hiện có: ${game.gold}</p>`;
    [{n: "Hạt Linh Thảo", p: 100}, {n: "Bạch Y", p: 500, col: '#fff'}, {n: "Hắc Y", p: 500, col: '#111'}].forEach(it => {
        let b = document.createElement('button'); b.className = 'btn-ui';
        b.innerText = `${it.n} (${it.p}G)`;
        b.onclick = () => {
            if(game.gold >= it.p) {
                game.gold -= it.p;
                if(it.n.includes("Hạt")) game.seeds++;
                else player.color = it.col;
                updateShop();
            }
        };
        s.appendChild(b);
    });
}

function updateFarm() {
    let f = document.getElementById('farm-grid');
    f.innerHTML = `<p>Hạt: ${game.seeds}</p>`;
    game.plants.forEach((p, i) => {
        let div = document.createElement('div'); div.className = 'slot';
        div.innerText = p ? (p.t > 0 ? "⏳"+p.t : "🌿XONG") : "ĐẤT";
        div.onclick = () => {
            if(!p && game.seeds > 0) { game.plants[i] = {t: 10}; game.seeds--; }
            else if(p && p.t <= 0) { player.hp = Math.min(player.maxHp, player.hp+40); game.plants[i] = null; addNotif("HỒI MÁU!"); }
            updateFarm();
        };
        f.appendChild(div);
    });
}

setInterval(() => {
    game.plants.forEach(p => { if(p && p.t > 0) p.t--; });
    if(document.getElementById('farm-panel').style.display === 'block') updateFarm();
}, 1000);

function gameOver() {
    game.dead = true;
    addNotif("BẠN ĐÃ TỬ TRẬN!");
    setTimeout(() => { location.reload(); }, 3000);
}

function checkCol(px, py) {
    if(game.inBossRoom) return px < player.x-400 || px > player.x+400 || py < player.y-400 || py > player.y+400;
    let tx = Math.floor(px/80), ty = Math.floor(py/80);
    return game.maze[ty] && game.maze[ty][tx] === 1;
}

function startDialogue(s, t) { game.dialogue = { active: true, speaker: s, text: t }; }
function addNotif(m) { game.notifs.push({ m, a: 1.0 }); }

// Input
window.onkeydown = (e) => {
    let k = e.key.toLowerCase();
    if(k==='w') player.vy=-1; if(k==='s') player.vy=1; if(k==='a') player.vx=-1; if(k==='d') player.vx=1;
    if(e.code==='Space') gameAction('space');
    if(k==='j') gameAction('j'); if(k==='k') gameAction('k'); if(k==='l') gameAction('l');
    if(k==='e') gameAction('space');
    if(k==='i') gameAction('i'); if(k==='p') gameAction('p'); if(k==='g') gameAction('g');
};
window.onkeyup = (e) => { if(['w','s','a','d'].includes(e.key.toLowerCase())) { player.vx=0; player.vy=0; }};

// Animation màn hình chờ
const cNam = document.getElementById('canvas-nam').getContext('2d');
const cNu = document.getElementById('canvas-nu').getContext('2d');
function animMenu() {
    cNam.clearRect(0,0,100,120); cNu.clearRect(0,0,100,120);
    drawPixel(cNam, 50, 60, '#3498db', false, 0, 8);
    drawPixel(cNu, 50, 60, '#f0f', false, 0, 8);
    if(game.state === 'menu') requestAnimationFrame(animMenu);
}

let loadP = 0;
let itv = setInterval(() => {
    loadP += 2; document.getElementById('load-fill').style.width = loadP + "%";
    if(loadP >= 100) { clearInterval(itv); document.getElementById('setup-box').style.display = 'block'; document.getElementById('load-box').style.display = 'none'; animMenu(); }
}, 30);

</script>
</body>
</html>
